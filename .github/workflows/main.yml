name: Auto Check-in

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install playwright aiohttp
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run check-in script
        env:
          MINIDUO_USER: ${{ secrets.MINIDUO_USER }}
          MINIDUO_PASS: ${{ secrets.MINIDUO_PASS }}
          SVYUN_USER: ${{ secrets.SVYUN_USER }}
          SVYUN_PASS: ${{ secrets.SVYUN_PASS }}
          VPS8_USER: ${{ secrets.VPS8_USER }}
          VPS8_PASS: ${{ secrets.VPS8_PASS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SCREENSHOT_DIR: "./screenshots"
        run: |
          mkdir -p screenshots
          python checkin.py
      
      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkin-debug-logs
          # 使用绝对相对路径，确保一定能抓到 png 文件
          path: screenshots/*.png
          retention-days: 3
