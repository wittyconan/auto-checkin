name: Auto Check-in
on:
  schedule:
    - cron: '20 1 * * *'  # 每日 UTC 1:20 执行 ✅ 已修复
  workflow_dispatch:      # 允许手动运行
env:
  TZ: Asia/Shanghai       # 时区统一（和你IPTV脚本保持一致）

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright aiohttp
          playwright install chromium
          playwright install-deps chromium
          sudo apt-get install -y xvfb

      - name: Run Check-in Script
        env:
          SVYUN_USER: ${{ secrets.SVYUN_USER }}
          SVYUN_PASS: ${{ secrets.SVYUN_PASS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SCREENSHOT_DIR: "./screenshots"
        run: |
          mkdir -p screenshots
          xvfb-run --server-args="-screen 0 1280x1024x24" python checkin.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkin-debug-logs
          path: screenshots/*.png
