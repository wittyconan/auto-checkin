name: Auto Check-in

on:
  schedule:
    # 稍微错开 0:00，避免和全球 GitHub Actions 的高峰期撞车导致卡顿
    - cron: '10 0 * * *' 
  workflow_dispatch: 

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 开启 pip 缓存，下次运行会快很多
          cache: 'pip' 
      
      - name: Install dependencies
        run: |
          # 确保 aiohttp 也在依赖中，或者直接在这里安装
          pip install playwright aiohttp 
          playwright install chromium
          # 这里只安装必要的浏览器依赖
          playwright install-deps chromium
      
      - name: Run check-in script
        env:
          # 保持 Secrets 名称和脚本内部读取的一致
          MINIDUO_USER: ${{ secrets.MINIDUO_USER }}
          MINIDUO_PASS: ${{ secrets.MINIDUO_PASS }}
          SVYUN_USER: ${{ secrets.SVYUN_USER }}
          SVYUN_PASS: ${{ secrets.SVYUN_PASS }}
          VPS8_USER: ${{ secrets.VPS8_USER }}
          VPS8_PASS: ${{ secrets.VPS8_PASS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SCREENSHOT_DIR: ./screenshots
        # 核心：确保文件名和你保存的 Python 脚本名完全一致
        run: python checkin.py 
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是失败都上传，方便你排查 Cloudflare 报错
        with:
          name: checkin-screenshots
          path: ./screenshots/
          retention-days: 7
